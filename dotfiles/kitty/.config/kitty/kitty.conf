# ~/.config/kitty/kitty.conf
# NightForge Arch Linux | Niri WM | herdr
# Colors auto-generated by matugen — run `matugen image ~/path/to/wallpaper.png`

# === Matugen-generated colors ===
include colors.conf
include tab-colors.conf

# === Fonts ===
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0
font_features    JetBrainsMono-Regular +liga +calt +cv02 +cv06 +cv10
adjust_line_height  2
adjust_column_width 0

# === Performance ===
input_delay    0
repaint_delay  2
sync_to_monitor no
wayland_enable_ime no

# === Transparency ===
background_opacity 0.95
dynamic_background_opacity no
window_padding_width 12
hide_window_decorations yes
cursor_shape        block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
mouse_hide_wait     2.0

# === Scrollback ===
scrollback_lines    10000
scrollback_pager    less --chop-long-lines --RAW-CONTROL-CHARS +G
scrollback_indicator_opacity 0.5

# === Shell Integration ===
shell_integration          enabled
allow_remote_control       yes
listen_on                  unix:/tmp/kitty.sock
update_check_interval      0

# === Tabs ===
tab_bar_edge               bottom
tab_bar_style              powerline
tab_separator              " ┇ "
active_tab_foreground      #000000
active_tab_background      #89b4fa
active_tab_font_style      bold
inactive_tab_foreground    #a6adc8
inactive_tab_background    #1e1e2e
inactive_tab_font_style    normal
tab_bar_margin_width       0.0
tab_bar_margin_height      0.0 2.0

# === Keybindings (port from Ghostty) ===
# Window management
map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+w close_window
map ctrl+shift+left neighboring_window left
map ctrl+shift+right neighboring_window right
map ctrl+shift+up neighboring_window up
map ctrl+shift+down neighboring_window down

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+tab next_tab
map ctrl+shift+right_bracket next_tab
map ctrl+shift+left_bracket previous_tab
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9

# Scrollback
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
map ctrl+shift+f kitten search

# Reload config (matches Ghostty default key)
map ctrl+shift+, reload_config_file

# Copy/paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font size (Ghostty-compatible)
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0
# Also super+ variants
map super+equal change_font_size all +2.0
map super+minus change_font_size all -2.0
map super+0 change_font_size all 0

# Layouts
map ctrl+shift+l next_layout
